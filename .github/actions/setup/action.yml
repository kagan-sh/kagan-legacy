name: Setup
description: Install uv + project deps, and optionally configure a test git identity. Requires the repo to be checked out first.

inputs:
  python-version:
    description: Python version for uv to install (empty = uv default).
    required: false
    default: ""
  configure-git:
    description: Set a throwaway git identity for tests that touch worktrees.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: true
        cache-dependency-glob: |
          uv.lock
          pyproject.toml
        python-version: ${{ inputs.python-version }}
    - if: inputs.configure-git == 'true'
      shell: bash
      run: |
        git config --global user.email "test@kagan.local"
        git config --global user.name "Kagan Test"
        git config --global commit.gpgsign false
    - shell: bash
      run: uv sync --frozen --dev
