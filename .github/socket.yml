# Socket Security Policy Configuration
# https://socket.dev/docs/configuration

licensePolicy:
  allow:
    # Permissive licenses
    - "MIT"
    - "Apache-2.0"
    - "Apache-2.0 WITH LLVM-exception"
    - "BSD-2-Clause"
    - "BSD-3-Clause"
    - "BSD-3-Clause-Clear"
    - "ISC"
    - "0BSD"
    - "Unlicense"
    - "CC0-1.0"
    - "WTFPL"
    # Weak copyleft - safe for dependencies
    - "MPL-2.0"
    - "LGPL-3.0"
    - "LGPL-2.1"

  warn:
    # Strong copyleft - review required
    - "GPL-3.0"
    - "GPL-2.0"
    - "AGPL-3.0"
    # Custom/non-standard licenses
    - "SEE LICENSE IN *"
    - "LicenseRef-*"

  deny:
    # Problematic licenses
    - "CC-BY-NC-*"
    - "CC-BY-ND-*"
    - "Proprietary"
    - "Commercial"
    - "UNLICENSED"

# Disable specific alert types for this repo
ignore:
  # We trust GitHub Actions packages
  - alertType: "license"
    packagePattern: "actions/*"
