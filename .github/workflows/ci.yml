name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/assets/**"
      - "mkdocs.yml"
      - ".readthedocs.yaml"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/assets/**"
      - "mkdocs.yml"
      - ".readthedocs.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run poe lint
      - run: uv run poe check-guardrails
      - run: uv run poe typecheck
      - run: uv run poe docs-check

  fast-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - run: uv run pytest tests/core/fast/ -n auto -q

  test:
    needs: [lint, fast-gate]
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install system dependencies
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y tmux git
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install tmux
          fi
      - name: Configure git for tests
        run: |
          git config --global user.email "test@kagan.local"
          git config --global user.name "Kagan Test"
          git config --global commit.gpgsign false
      - run: uv sync --dev
      - name: Test (with coverage)
        if: github.ref == 'refs/heads/main'
        run: uv run pytest tests/ -m "not snapshot" -n auto --cov=src/kagan --cov-report=term-missing
      - name: Test
        if: github.ref != 'refs/heads/main'
        run: uv run pytest tests/ -m "not snapshot" -n auto

  test-windows:
    needs: [lint, fast-gate]
    timeout-minutes: 30
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: choco install git -y
      - name: Configure git for tests
        run: |
          git config --global user.email "test@kagan.local"
          git config --global user.name "Kagan Test"
          git config --global commit.gpgsign false
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      # --- Required: core fast tests must pass on Windows ---
      - name: Core fast tests (required)
        run: uv run pytest tests/core/fast/ -m "core and fast" -n 0 -v
      # --- Required: core unit tests must pass on Windows ---
      - name: Core unit tests (required)
        run: uv run pytest tests/core/unit/ -m "core and unit" -n 0 -v
      # --- Required: MCP contract tests must pass on Windows ---
      - name: MCP contract tests (required)
        run: uv run pytest tests/mcp/contract/ -m "mcp and contract" -n 0 -v
      # --- Required: core/MCP smoke tests must pass on Windows ---
      - name: Core and MCP smoke tests (required)
        run: uv run pytest tests/core/smoke/ tests/mcp/smoke/ -m smoke -n 0 -v
      # --- Advisory: TUI smoke tests may fail on Windows ---
      - name: TUI smoke tests (advisory)
        continue-on-error: true
        run: uv run pytest tests/tui/smoke/ -m "tui and smoke" -n 0 -v
      - name: Warn on TUI failure
        if: failure()
        run: echo "::warning::Windows TUI smoke tests failed — this is advisory and does not block the pipeline."

  snapshot:
    needs: lint
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux git
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux
      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install git -y
      - name: Configure git for tests
        run: |
          git config --global user.email "test@kagan.local"
          git config --global user.name "Kagan Test"
          git config --global commit.gpgsign false
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - name: Snapshot tests
        run: uv run pytest tests/tui/snapshot/ -n auto -v

  test-all-platforms:
    needs: lint
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04-arm, macos-15-intel]
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y tmux git
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install tmux
          fi
      - name: Configure git for tests
        run: |
          git config --global user.email "test@kagan.local"
          git config --global user.name "Kagan Test"
          git config --global commit.gpgsign false
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      # Exclude snapshot tests from matrix runs; covered by dedicated job.
      - run: uv run pytest tests/ -m "not snapshot" -n auto --cov=src/kagan --cov-report=term-missing
