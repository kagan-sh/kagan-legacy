name: CI

on:
  pull_request:
    paths-ignore:
      - "*.md"
      - ".github/assets/**"
      - ".readthedocs.yaml"
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".github/assets/**"
      - ".readthedocs.yaml"
  schedule:
    - cron: "0 3 * * 1" # weekly, Monday 03:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: uv run poe lint
      - run: uv run poe check-guardrails
      - run: uv run poe typecheck
      - run: uv run poe check-boundaries
      - run: uv run poe deadcode
      - run: uv run poe docs-check

  fast-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: uv run pytest tests/kagan/ -m "unit or smoke" -n auto -q

  test-pr:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    needs: [lint, fast-gate]
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          configure-git: "true"
      - name: Test
        run: uv run pytest tests/ -m "not snapshot" -n auto --cov=kagan --cov-report=term-missing --cov-fail-under=0

  test-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, fast-gate]
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
          configure-git: "true"
      - name: Test
        run: uv run pytest tests/ -m "not snapshot" -n auto --cov=kagan --cov-report=term-missing --cov-fail-under=0

  test-windows:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    needs: [lint, fast-gate]
    timeout-minutes: 10
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
        with:
          configure-git: "true"
      - name: Test (windows compatibility marker)
        run: uv run pytest tests/ -m "windows_ci or smoke" -n 0 -v

  snapshot:
    # Run pre-merge on TUI-affecting PRs and post-merge on main, so visual
    # regressions are caught before they land.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    needs: lint
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
        with:
          configure-git: "true"
      - name: Snapshot tests
        run: uv run pytest tests/kagan/tui/smoke/ -n auto -v

  test-all-platforms:
    if: github.event_name == 'schedule'
    timeout-minutes: 25
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-24.04-arm, macos-15-intel]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
        with:
          configure-git: "true"
      # Exclude snapshot tests from matrix runs; covered by dedicated job.
      - run: uv run pytest tests/ -m "not snapshot" -n auto

  secrets:
    # Server-side secret scan: the gitleaks pre-commit hook is bypassable
    # with --no-verify, so gate on it in CI too. Free for public repos.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
