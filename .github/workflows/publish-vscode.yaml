name: Publish VS Code Extension

on:
  workflow_call:
    inputs:
      pre-release:
        description: "Publish as pre-release (beta)"
        type: boolean
        required: false
        default: false
    secrets:
      VSCE_PAT:
        required: false
      OPEN_VSIX_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      pre-release:
        description: "Publish as pre-release (beta)"
        type: boolean
        required: false
        default: false

jobs:
  publish:
    name: Package & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OPEN_VSIX_TOKEN: ${{ secrets.OPEN_VSIX_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install and build
        working-directory: packages/vscode
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Package VSIX
        working-directory: packages/vscode
        run: |
          if [[ "${{ inputs.pre-release }}" == "true" ]]; then
            pnpm exec vsce package --allow-missing-repository --no-dependencies --pre-release
          else
            pnpm exec vsce package --allow-missing-repository --no-dependencies
          fi

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        working-directory: packages/vscode
        run: |
          FLAGS="--packagePath $(ls *.vsix) --allow-missing-repository"
          if [[ "${{ inputs.pre-release }}" == "true" ]]; then
            FLAGS="$FLAGS --pre-release"
          fi
          pnpm exec vsce publish $FLAGS || {
            if [[ $? -eq 1 ]] && pnpm exec vsce show kagan.kagan-vscode --json 2>/dev/null | grep -q "$(node -p 'require("./package.json").version')"; then
              echo "::warning::Version already exists on VS Code Marketplace — skipping."
            else
              exit 1
            fi
          }

      - name: Publish to Open VSX
        if: inputs.pre-release != true && env.OPEN_VSIX_TOKEN != ''
        working-directory: packages/vscode
        run: |
          pnpm exec ovsx publish $(ls *.vsix) -p "$OPEN_VSIX_TOKEN" || {
            echo "::warning::Open VSX publish failed (version may already exist) — skipping."
          }

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kagan-vscode
          path: packages/vscode/*.vsix
