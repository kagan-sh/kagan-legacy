name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0)"
        type: string
        required: true
      target:
        description: "Publish target"
        type: choice
        required: true
        default: "both"
        options:
          - both
          - marketplace
          - openvsx
      pre-release:
        description: "Publish as pre-release (beta)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  publish:
    name: Package & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OPEN_VSIX_TOKEN: ${{ secrets.OPEN_VSIX_TOKEN }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_SK }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Bump version
        working-directory: packages/vscode
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ inputs.version }}';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Version set to ${{ inputs.version }}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/vscode/package.json
          git diff --cached --quiet && echo "Version already at ${{ inputs.version }}" || {
            git commit -m "chore(vscode): bump to ${{ inputs.version }} [skip ci]"
            git push
          }

      - name: Install and build
        working-directory: packages/vscode
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Package VSIX
        working-directory: packages/vscode
        run: |
          if [[ "${{ inputs.pre-release }}" == "true" ]]; then
            pnpm exec vsce package --allow-missing-repository --no-dependencies --pre-release
          else
            pnpm exec vsce package --allow-missing-repository --no-dependencies
          fi

      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != '' && (inputs.target == 'both' || inputs.target == 'marketplace')
        working-directory: packages/vscode
        run: |
          FLAGS="--packagePath $(ls *.vsix) --allow-missing-repository"
          if [[ "${{ inputs.pre-release }}" == "true" ]]; then
            FLAGS="$FLAGS --pre-release"
          fi
          pnpm exec vsce publish $FLAGS

      - name: Publish to Open VSX
        if: env.OPEN_VSIX_TOKEN != '' && (inputs.target == 'both' || inputs.target == 'openvsx')
        working-directory: packages/vscode
        run: |
          pnpm exec ovsx create-namespace kagan -p "$OPEN_VSIX_TOKEN" 2>/dev/null || true
          pnpm exec ovsx publish $(ls *.vsix) -p "$OPEN_VSIX_TOKEN"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: kagan-vscode-${{ inputs.version }}
          path: packages/vscode/*.vsix
