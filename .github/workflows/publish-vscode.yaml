name: Publish VS Code Extension

on:
  workflow_call:
    secrets:
      VSCE_PAT:
        required: false
      OPEN_VSIX_TOKEN:
        required: false
  workflow_dispatch:

jobs:
  publish:
    name: Package & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install and build
        working-directory: packages/vscode
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Package VSIX
        working-directory: packages/vscode
        run: pnpm exec vsce package --allow-missing-repository --no-dependencies

      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        working-directory: packages/vscode
        run: pnpm exec vsce publish --packagePath $(ls *.vsix) --allow-missing-repository
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: ${{ secrets.OPEN_VSIX_TOKEN != '' }}
        working-directory: packages/vscode
        run: pnpm exec ovsx publish $(ls *.vsix) -p "$OPEN_VSIX_TOKEN"
        env:
          OPEN_VSIX_TOKEN: ${{ secrets.OPEN_VSIX_TOKEN }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kagan-vscode
          path: packages/vscode/*.vsix
